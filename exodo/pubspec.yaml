name: exodo
description: "Éxodo by Behavior — IA con contexto dominicano"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4+1
  markdown: ^7.3.0
  provider: ^6.1.2
  http: ^1.2.2
  image_picker: ^1.2.2
  file_picker: 8.1.4
  speech_to_text: ^7.4.0
  shared_preferences: ^2.3.2
  flutter_tts: ^4.2.0
  url_launcher: ^6.3.1
  share_plus: ^12.0.2
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  fonts:
    - family: AnthropicSans
      fonts:
        - asset: assets/fonts/AnthropicSans-Text-Light-Static.otf
          weight: 300
        - asset: assets/fonts/AnthropicSans-Text-Regular-Static.otf
          weight: 400
        - asset: assets/fonts/AnthropicSans-Text-RegularItalic-Static.otf
          weight: 400
          style: italic
        - asset: assets/fonts/AnthropicSans-Text-Medium-Static.otf
          weight: 500
        - asset: assets/fonts/AnthropicSans-Text-MediumItalic-Static.otf
          weight: 500
          style: italic
        - asset: assets/fonts/AnthropicSans-Text-Semibold-Static.otf
          weight: 600
        - asset: assets/fonts/AnthropicSans-Text-Bold-Static.otf
          weight: 700
        - asset: assets/fonts/AnthropicSans-Text-BoldItalic-Static.otf
          weight: 700
          style: italic
        - asset: assets/fonts/AnthropicSans-Text-Extrabold-Static.otf
          weight: 800
        - asset: assets/fonts/AnthropicSans-Text-ExtraboldItalic-Static.otf
          weight: 800
          style: italic

    - family: AnthropicSerif
      fonts:
        - asset: assets/fonts/AnthropicSerif-Text-Light-Static.otf
          weight: 300
        - asset: assets/fonts/AnthropicSerif-Text-LightItalic-Static.otf
          weight: 300
          style: italic
        - asset: assets/fonts/AnthropicSerif-Text-Regular-Static.otf
          weight: 400
        - asset: assets/fonts/AnthropicSerif-Text-RegularItalic-Static.otf
          weight: 400
          style: italic
        - asset: assets/fonts/AnthropicSerif-Text-Medium-Static.otf
          weight: 500
        - asset: assets/fonts/AnthropicSerif-Text-MediumItalic-Static.otf
          weight: 500
          style: italic
        - asset: assets/fonts/AnthropicSerif-Text-Semibold-Static.otf
          weight: 600
        - asset: assets/fonts/AnthropicSerif-Text-SemiboldItalic-Static.otf
          weight: 600
          style: italic
        - asset: assets/fonts/AnthropicSerif-Text-Bold-Static.otf
          weight: 700
        - asset: assets/fonts/AnthropicSerif-Text-BoldItalic-Static.otf
          weight: 700
          style: italic
        - asset: assets/fonts/AnthropicSerif-Text-Extrabold-Static.otf
          weight: 800
        - asset: assets/fonts/AnthropicSerif-Text-ExtraboldItalic-Static.otf
          weight: 800
          style: italic


    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
          weight: 400
        - asset: assets/fonts/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
